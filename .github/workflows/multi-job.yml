name: multi-job

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name : build step
            run : echo "Running Test"
    test:
      runs-on: ubuntu-latest
      needs: build
      steps:
          - name: test step
            run: echo "test step"
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
          - name: Deploy step
            run: echo "deploying"                    

