name: Upload-artifact

on: [push]

jobs:
  upload-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: create file 
        run: | 
          echo "Test Report - Success " > report.txt
          echo "Execution Time :$(date)" >> report.txt
      - name: Upload artifact 
        uses: actions/upload-artifact@v4
        with:
          name: my-report
          path: report.txt     
    