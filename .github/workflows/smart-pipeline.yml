name: smart-pipeline

on : 
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Linting code.."
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running Test.."
  summary:
    runs-on: ubuntu-latest
    needs: [lint,test]

    steps:
      - name: branch info
        run: |
          if [["${{ github.ref}}" == "refs/heads/main"]]; then
            echo "Main branch push 🚀"
          else
            echo "feature branch push"
          fi

      - name: Commit message
        run: echo "commit :${{ github.event.commits[0].message }}"


