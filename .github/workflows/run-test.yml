name: Run Real Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4
      - name: setup python 
        uses: actions/setup-python@v5
        with: 
          python-version:'3.11'
      - name: Run Test script 
        run: python test_script.py    

      
