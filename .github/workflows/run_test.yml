name: Real test 

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v5

      - name: Setup python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Test Script 
        run: python test_script.py    
